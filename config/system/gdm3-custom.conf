# /etc/gdm3/custom.conf
# GDM3 configuration for RoboSnailBob headless operation.
#
# IMPORTANT: Every comment line MUST start with #
# A missing # on any comment line causes GDM to silently ignore the entire file,
# breaking auto-login and Wayland disable. Hard-learned lesson.

[daemon]
AutomaticLoginEnable=true
AutomaticLogin=jadam
WaylandEnable=false

[security]

[xdmcp]

[chooser]

[debug]
# Enable=true
